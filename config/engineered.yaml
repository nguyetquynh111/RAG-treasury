data_dir: data
csv_path: officeqa_full.csv
selected_years:
  - 2020
  - 2021
  - 2022
  - 2023
  - 2024
  - 2025
  - 2026

vector_db_type: faiss
embedding:
  backend: deepinfra
  model_name: nvidia/llama-nemotron-embed-vl-1b-v2
  base_url: https://api.deepinfra.com/v1/openai
  api_key_env: DEEPINFRA_API_KEY
  normalize: true
  batch_size: 32
  timeout_seconds: 300
  request_sleep_seconds: 0.0
  retry_sleep_seconds: 5.0
  max_retries: 3

chunk_size: 768
chunk_overlap: 100
bm25_top_k: 20
vector_top_k: 20
final_top_k: 5
fusion_method: rrf
rrf_k: 60
reranker:
  backend: none
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  candidate_top_k: 20
  allow_fallback: true
generation:
  backend: deepinfra
  model: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning
  base_url: https://api.deepinfra.com/v1/openai
  api_key_env: DEEPINFRA_API_KEY
  temperature: 0.0
  max_tokens: 128
  max_context_chars: 3000
  timeout_seconds: 300
  request_sleep_seconds: 0.0
  retry_sleep_seconds: 5.0
  max_retries: 3
  allow_extractive_fallback: true
  require_citations: true
  fallback_on_ungrounded_answer: true
output_dir: outputs/engineered
