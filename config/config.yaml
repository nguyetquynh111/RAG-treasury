data_dir: data
csv_path: officeqa_full.csv
selected_years:
  - 2020
  - 2021
  - 2022
  - 2023
  - 2024
  - 2025
  - 2026
document_years:
  - 2010
  - 2011
  - 2012
  - 2013
  - 2014
  - 2015
  - 2016
  - 2017
  - 2018
  - 2019
  - 2020
  - 2021
  - 2022
  - 2023
  - 2024
  - 2025
  - 2026

vector_db_type: faiss
index_dir: outputs/index
embedding:
  backend: deepinfra
  model_name: nvidia/llama-nemotron-embed-vl-1b-v2
  base_url: https://api.deepinfra.com/v1/openai
  api_key_env: DEEPINFRA_API_KEY
  normalize: true
  batch_size: 32
  timeout_seconds: 300
  request_sleep_seconds: 0.0
  retry_sleep_seconds: 5.0
  max_retries: 3

chunk_size: 512
chunk_overlap: 50
top_k: 5
generation:
  backend: deepinfra
  model: Qwen/Qwen2.5-72B-Instruct
  base_url: https://api.deepinfra.com/v1/openai
  api_key_env: DEEPINFRA_API_KEY
  temperature: 0.0
  max_tokens: 512
  max_context_chars: 16000
  timeout_seconds: 300
  request_sleep_seconds: 0.0
  retry_sleep_seconds: 5.0
  max_retries: 3
  allow_extractive_fallback: true
  require_citations: true
  fallback_on_ungrounded_answer: true

runs:
  baseline:
    output_dir: outputs/baseline
    metadata_enabled: false
  engineered:
    output_dir: outputs/engineered
    metadata_enabled: true
